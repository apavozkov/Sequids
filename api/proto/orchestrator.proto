syntax = "proto3";

package sequids.orchestrator.v1;

option go_package = "sequids/api/gen/orchestratorv1;orchestratorv1";

message DeviceConfig {
  string id = 1;
  string type = 2;
  string topic = 3;
  double publish_frequency_hz = 4;
  string formula = 5;
}

message RegisterWorkerRequest {
  string worker_id = 1;
  string address = 2;
  repeated string capabilities = 3;
}

message RegisterWorkerResponse {
  bool accepted = 1;
}

message RunExperimentRequest {
  string scenario_id = 1;
  int64 seed = 2;
}

message RunExperimentResponse {
  string run_id = 1;
}

message PushScenarioRequest {
  string name = 1;
  string yaml = 2;
}

message PushScenarioResponse {
  string scenario_id = 1;
}

service OrchestratorService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc RunExperiment(RunExperimentRequest) returns (RunExperimentResponse);
  rpc PushScenario(PushScenarioRequest) returns (PushScenarioResponse);
}

service WorkerControlService {
  rpc StartWorkload(StartWorkloadRequest) returns (StartWorkloadResponse);
}

message StartWorkloadRequest {
  string run_id = 1;
  int64 seed = 2;
  repeated DeviceConfig devices = 3;
}

message StartWorkloadResponse {
  bool started = 1;
}
