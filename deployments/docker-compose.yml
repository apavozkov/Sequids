services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  influxdb:
    image: influxdb:2.7
    ports: ["8086:8086"]
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminadmin
      - DOCKER_INFLUXDB_INIT_ORG=sequids
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=sequids-token

  telegraf:
    image: telegraf:1.31
    depends_on: [central, worker, influxdb]
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on: [influxdb]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards

  central:
    image: golang:1.25
    working_dir: /app
    volumes: ["../:/app"]
    command:
      - /bin/sh
      - -lc
      - |
        apt-get update && apt-get install -y --no-install-recommends gcc libsqlite3-dev && \
        /usr/local/go/bin/go run ./cmd/central serve \
          -grpc-addr :50051 \
          -metrics-addr :8080 \
          -db /app/sequids.db \
          -formulas /app/configs/formulas/formulas.yaml \
          -anomalies /app/configs/anomalies/anomalies.yaml
    ports: ["8080:8080", "50051:50051"]
    restart: unless-stopped

  worker:
    image: golang:1.25
    working_dir: /app
    volumes: ["../:/app"]
    command:
      - /bin/sh
      - -lc
      - |
        apt-get update && apt-get install -y --no-install-recommends mosquitto-clients && \
        /usr/local/go/bin/go run ./cmd/worker \
          -grpc-addr worker:50052 \
          -metrics-addr :8090 \
          -central-grpc central:50051 \
          -mqtt-host mosquitto -mqtt-port 1883 \
          -influx-url http://influxdb:8086 \
          -influx-token sequids-token \
          -influx-org sequids \
          -influx-bucket metrics
    depends_on: [central, mosquitto, influxdb]
    ports: ["8090:8090", "50052:50052"]
    restart: unless-stopped
