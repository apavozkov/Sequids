apiVersion: 1
datasources:
  - name: InfluxDB-Sequids
    uid: influxdb-sequids
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: sequids
      defaultBucket: metrics
    secureJsonData:
      token: sequids-token
    isDefault: true
