[agent]
  interval = "5s"
  flush_interval = "5s"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "sequids-token"
  organization = "sequids"
  bucket = "metrics"

[[inputs.prometheus]]
  urls = ["http://central:8080/metrics", "http://worker1:8090/metrics", "http://worker2:8091/metrics"]
